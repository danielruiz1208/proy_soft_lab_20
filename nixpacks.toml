[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "ls -la public/build",
  "ls -la public/build/assets"
]

[start]
cmd = "php artisan optimize:clear && php artisan migrate --force && php -S 0.0.0.0:$PORT server.php"
